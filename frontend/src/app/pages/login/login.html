<!-- Login Page Content -->
<main class="min-h-screen flex justify-center bg-gray-50 pt-32">
  <div class="max-w-md w-full space-y-8 p-8">
    <div class="text-center">
      <h1 class="text-3xl font-bold text-gray-900 mb-8">LogIn</h1>
    </div>
    
    <!-- form -->
    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="space-y-6">
      <div>
        <!-- input -->
        <input 
          type="text" 
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand focus:border-brand bg-gray-100" 
          name="username" 
          id="inputUsername4" 
          placeholder="Username" 
          [(ngModel)]="loginData.username"
          required>
      </div>

      <div>
        <!-- input -->
        <input 
          type="password" 
          class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-brand focus:border-brand bg-gray-100" 
          name="password" 
          id="inputPassword4" 
          placeholder="Password" 
          [(ngModel)]="loginData.password"
          required>
      </div>
      
      <!-- btn -->
      <div>
        <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-brand hover:bg-green-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand">
          Login Now
        </button>
      </div>

      <!-- text -->
      <p class="text-center text-sm text-gray-600">
        <b>New Customer ? <a routerLink="/register" class="text-brand hover:text-green-600">Register</a></b>
      </p>
    </form>
  </div>
</main>
